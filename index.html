<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial;
    }

    /* Fullscreen GIF */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Center content */
    .content {
      text-align: center;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00f0ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    /* Fullscreen container to center the content */
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 90%;
      max-width: 400px;
      z-index: 1000;
    }

    .popup h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }

    .popup button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .popup .continue {
      background-color: #4CAF50;
      color: white;
    }

    .popup .go-back {
      background-color: #f44336;
      color: white;
    }

    .popup button:hover {
      opacity: 0.8;
    }

    /* Background overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 999;
      display: none; /* Initially hidden */
    }

  </style>
</head>
<body>

  <!-- GIF Image -->
  <img src="https://i.imgur.com/gO9HjHM.gif" class="bg">

  <!-- Center Button -->
  <div class="content">
    <button onclick="goLink()">Continue</button>
  </div>

  <!-- Background Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Popup Modal -->
  <div class="popup" id="popup">
    <h2>You're leaving our app. The website you're viewing is attempting to open an external app. Would you like to continue?</h2>
    <button class="go-back" onclick="goBack()">Go Back</button>
    <button class="continue" onclick="continueRedirect()">Continue</button>
  </div>

  <script>
    // Links for redirection
    var links = [
      "https://www.profitablecpmratenetwork.com/ci81ra5wvk?key=36529391860db6f7a826bd7d07dc64bc",
      "https://www.profitablecpmratenetwork.com/vu9fe788w?key=34c7a4c3abcce8570d4112c7c10b5bc0",
      "https://www.profitablecpmratenetwork.com/iv1jyzip?key=a8ded032f56e52c55b783e36e5db9770",
      "https://www.profitablecpmratenetwork.com/u6mgmr4yny?key=907e89ff74ce2eca3005b47bc8e86c76",
      "https://www.profitablecpmratenetwork.com/gh9yty1j?key=5e086de21b92f2a81953ba7d84b99fdc"
    ];

    // Random link
    var randomLink = links[Math.floor(Math.random() * links.length)];

    // Flag to control the popup loop
    let isLoopActive = true;

    // Function to trigger the popup when a user clicks a button
    function showPopup() {
      document.getElementById('popup').style.display = 'block';
      document.getElementById('overlay').style.display = 'block'; // Show overlay when popup appears
    }

    // Function to handle the "Go Back" button click
    function goBack() {
      // Keep showing the popup indefinitely
      setTimeout(() => {
        if (isLoopActive) {
          showPopup(); // Show the popup again
        }
      }, 500);
    }

    // Function to handle the "Continue" button click
    function continueRedirect() {
      // Check if the user is on a mobile device and trigger an external browser redirection
      if (isInAppBrowser()) {
        // Open the link in an external browser (Android intent)
        openExternalBrowser(randomLink);
      } else {
        // Open the link normally in a new tab
        window.open(randomLink, '_blank');
      }

      // Hide the popup once "Continue" is clicked
      document.getElementById('popup').style.display = 'none';
      document.getElementById('overlay').style.display = 'none'; // Hide overlay after "Continue"
    }

    // Function to detect if the user is on an in-app browser (like Facebook, Instagram, etc.)
    function isInAppBrowser() {
      let ua = navigator.userAgent || navigator.vendor || window.opera;
      return /FBAN|FBAV|Instagram|Messenger/i.test(ua);
    }

    // Function to open a link in an external browser (Chrome, Safari, etc.)
    function openExternalBrowser(url) {
      let intentUrl = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
      window.location.href = intentUrl; // Trigger external browser redirect
    }

    // Function for button click redirection and popup loop
    function goLink() {
      // Trigger the popups
      showPopup();
      // Redirect to the random link
      setTimeout(() => {
        window.location.href = randomLink;
      }, 1000);
    }
  </script>

</body>
</html>
