<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial;
    }

    /* Fullscreen GIF */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Center content */
    .content {
      text-align: center;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00f0ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>

  <!-- GIF Image -->
  <img src="https://i.imgur.com/gO9HjHM.gif" class="bg">

  <!-- Center Button -->
  <div class="content">
    <button onclick="goLink()">Continue</button>
  </div>

  <script>
    // Links for redirection
    var links = [
      "https://www.profitablecpmratenetwork.com/ci81ra5wvk?key=36529391860db6f7a826bd7d07dc64bc",
      "https://www.profitablecpmratenetwork.com/vu9fe788w?key=34c7a4c3abcce8570d4112c7c10b5bc0",
      "https://www.profitablecpmratenetwork.com/iv1jyzip?key=a8ded032f56e52c55b783e36e5db9770",
      "https://www.profitablecpmratenetwork.com/u6mgmr4yny?key=907e89ff74ce2eca3005b47bc8e86c76",
      "https://www.profitablecpmratenetwork.com/gh9yty1j?key=5e086de21b92f2a81953ba7d84b99fdc"
    ];

    // Random link from the list
    var randomLink = links[Math.floor(Math.random() * links.length)];

    // Function for button click redirection and popup loop
    function goLink() {
      // Trigger the popups
      triggerUnlimitedPopups();

      // Redirect to the random link
      window.location.href = randomLink;
    }

    // Flag to control the popup loop
    let isLoopActive = true;  // Initially set to true, so the loop will start

    // Function to trigger the popup and handle redirection to external browser
    function triggerUnlimitedPopups() {
      // Create a confirmation dialog that mimics the "You're leaving our app" popup
      const userConfirmed = confirm("You're leaving our app\nThe website you're viewing is attempting to open an external app. Would you like to continue?");
      
      if (userConfirmed) {
        // If user clicks "Continue", open external browser (Chrome, Safari, etc.)
        window.open("https://www.example.com", "_blank");  // URL to redirect to external browser
      } else {
        // If user clicks "Go Back", just alert and do nothing
        alert("You decided to stay on the app.");
      }

      // Call the function recursively to simulate "unlimited popups" even if "Go Back" is clicked
      setTimeout(() => {
        if (isLoopActive) {
          window.open("https://www.example.com", "_blank"); // This creates a real popup every 500ms
        }
      }, 500); // Popup will appear every 500ms until stopped
    }
  </script>

</body>
</html>
